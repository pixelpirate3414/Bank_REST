openapi: 3.1.3
info:
  title: Card Service API
  version: 1.0.0
  description: REST API для банковских операций.
servers:
  - url: /api/{apiVersion}
    variables:
      apiVersion:
        default: v1
paths:
  /auth/sign-up:
    $ref: '../docs/api-schemas/auth-api.yaml#/paths/~1auth~1sign-up'

  /auth/sign-in:
    $ref: '../docs/api-schemas/auth-api.yaml#/paths/~1auth~1sign-in'

  /admin/cards:
    security:
      - bearerAuth: [ ]
    $ref: '../docs/api-schemas/admin-card-api.yaml#/paths/~1admin~1cards'

  /admin/cards/{cardId}:
    security:
      - bearerAuth: [ ]
    $ref: '../docs/api-schemas/admin-card-api.yaml#/paths/~1admin~1cards~1{cardId}'

  /admin/cards/user/{userId}:
    security:
      - bearerAuth: [ ]
    $ref: '../docs/api-schemas/admin-card-api.yaml#/paths/~1admin~1cards~1user~1{userId}'

  /admin/cards/{cardId}/activate:
    security:
      - bearerAuth: [ ]
    $ref: '../docs/api-schemas/admin-card-api.yaml#/paths/~1admin~1cards~1{cardId}~1activate'

  /admin/cards/block-requests/{requestId}/block:
    security:
      - bearerAuth: [ ]
    $ref: '../docs/api-schemas/admin-card-api.yaml#/paths/~1admin~1cards~1block-requests~1{requestId}~1block'

  /admin/cards/block-requests/{requestId}:
    security:
      - bearerAuth: [ ]
    $ref: '../docs/api-schemas/admin-card-api.yaml#/paths/~1admin~1cards~1block-requests~1{requestId}'

  /admin/cards/block-requests:
    security:
      - bearerAuth: [ ]
    $ref: '../docs/api-schemas/admin-card-api.yaml#/paths/~1admin~1cards~1block-requests'

  /admin/users:
    security:
      - bearerAuth: [ ]
    $ref: '../docs/api-schemas/admin-user-api.yaml#/paths/~1admin~1users'

  /admin/users/{userId}:
    security:
      - bearerAuth: [ ]
    $ref: '../docs/api-schemas/admin-user-api.yaml#/paths/~1admin~1users~1{userId}'

  /cards:
    security:
      - bearerAuth: [ ]
    $ref: '../docs/api-schemas/card-api.yaml#/paths/~1cards'

  /cards/{cardId}:
    security:
      - bearerAuth: [ ]
    $ref: '../docs/api-schemas/card-api.yaml#/paths/~1cards~1{cardId}'

  /cards/{cardId}/block-request:
    security:
      - bearerAuth: [ ]
    $ref: '../docs/api-schemas/card-api.yaml#/paths/~1cards~1{cardId}~1block-request'

  /transactions/transfer:
    security:
      - bearerAuth: [ ]
    $ref: '../docs/api-schemas/transaction-api.yaml#/paths/~1transactions~1transfer'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT