openapi: 3.1.3
info:
  title: Transaction API
  version: 1.0.0

servers:
  - url: /{apiVersion}
    variables:
      apiVersion:
        default: v1

paths:
  /transactions/transfer:
    post:
      tags:
        - Transactions
      summary: Money transfer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../component-schemas/web/request-shemas.yaml#/components/schemas/TransferRequest'
      responses:
        '200':
          description: Transfer result (card balance)
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/CardBalanceResponse'
        '401':
          description: Неавторизован
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/SecurityResponse'
        '404':
          description: Карт(ы) не существует
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/ExceptionResponse'
        '400':
          description: Ошибка валидации данных
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/ExceptionResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT