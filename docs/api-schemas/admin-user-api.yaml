openapi: 3.1.3
info:
  title: Admin User API
  version: 1.0.0

servers:
  - url: /{apiVersion}
    variables:
      apiVersion:
        default: v1

paths:
  /admin/users:
    get:
      tags:
        - Admin
      summary: Get all users (paged)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 0
        - name: size
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Paged users
          content:
            application/json:
              schema:
                $ref: '../component-schemas/dto/dto-schemas.yaml#/components/schemas/UserAdminDto'
        '401':
          description: Неавторизован
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/SecurityResponse'
        '400':
          description: Ошибка валидации данных
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/ExceptionResponse'

  /admin/users/{userId}:
    get:
      tags:
        - Admin
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '../component-schemas/dto/dto-schemas.yaml#/components/schemas/UserAdminDto'
        '401':
          description: Неавторизован
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/SecurityResponse'
        '404':
          description: Пользователя не существует
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/ExceptionResponse'
        '400':
          description: Ошибка валидации данных
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/ExceptionResponse'

    delete:
      tags:
        - Admin
      summary: Delete user
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: No Content
        '401':
          description: Неавторизован
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/SecurityResponse'
        '404':
          description: Пользователя не существует
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/ExceptionResponse'
        '400':
          description: Ошибка валидации данных
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/ExceptionResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT