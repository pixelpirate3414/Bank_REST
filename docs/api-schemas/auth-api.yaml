openapi: 3.1.3
info:
  title: Auth API
  version: 1.0.0

servers:
  - url: /{apiVersion}
    variables:
      apiVersion:
        default: v1

paths:
  /auth/sign-up:
    post:
      tags:
        - Auth
      summary: User registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../component-schemas/web/request-shemas.yaml#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Registered user
          content:
            application/json:
              schema:
                $ref: '../component-schemas/dto/dto-schemas.yaml#/components/schemas/UserDto'
        '409':
          description: Пользователь с таким именем уже существует
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/ExceptionResponse'
        '400':
          description: Ошибка валидации данных
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/ExceptionResponse'

  /auth/sign-in:
    post:
      tags:
        - Auth
      summary: User authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../component-schemas/web/request-shemas.yaml#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Authentication response
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/AuthResponse'
        '401':
          description: Bad credentials
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/ExceptionResponse'
        '400':
          description: Ошибка валидации данных
          content:
            application/json:
              schema:
                $ref: '../component-schemas/web/response-shemas.yaml#/components/schemas/ExceptionResponse'